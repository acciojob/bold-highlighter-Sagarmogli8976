<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bold Highlighter</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <p>
    This is an <strong>example</strong> paragraph with some 
    <strong>important</strong> words that need <strong>attention</strong>.
  </p>

  <a href="#" onmouseover="highlight()" onmouseout="return_normal()">
    Hover over me!
  </a>

  <script src="script.js"></script>
</body>
</html>
